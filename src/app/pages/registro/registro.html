<div class="login-container">
  <h2>Crear Cuenta de Usuario</h2>
  <p>Completá los datos para acceder al sistema de tickets.</p>

  <div class="form-group">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Correo Electrónico" required>
    <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
  </div>
  
  <div class="actions">
    <button type="button" (click)="guardarUsuario()">Registrar Usuario</button>
    <button type="button" (click)="volver()" class="btn-secondary">Volver al Login</button>
  </div>

  <p *ngIf="mensaje" class="info-msg">{{ mensaje }}</p>
</div>
